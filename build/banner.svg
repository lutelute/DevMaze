<svg width="1280" height="640" viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="60%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="mainLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1D4ED8" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#3B82F6" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#60A5FA" stop-opacity="0.5"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textglow">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle grid dots -->
  <g opacity="0.04" fill="#3B82F6">
    <circle cx="80" cy="160" r="2"/><circle cx="160" cy="160" r="2"/><circle cx="240" cy="160" r="2"/>
    <circle cx="320" cy="160" r="2"/><circle cx="400" cy="160" r="2"/><circle cx="480" cy="160" r="2"/>
    <circle cx="80" cy="240" r="2"/><circle cx="160" cy="240" r="2"/><circle cx="240" cy="240" r="2"/>
    <circle cx="320" cy="240" r="2"/><circle cx="400" cy="240" r="2"/><circle cx="480" cy="240" r="2"/>
    <circle cx="80" cy="320" r="2"/><circle cx="160" cy="320" r="2"/><circle cx="240" cy="320" r="2"/>
    <circle cx="320" cy="320" r="2"/><circle cx="400" cy="320" r="2"/><circle cx="480" cy="320" r="2"/>
    <circle cx="80" cy="400" r="2"/><circle cx="160" cy="400" r="2"/><circle cx="240" cy="400" r="2"/>
    <circle cx="80" cy="480" r="2"/><circle cx="160" cy="480" r="2"/>
  </g>

  <!-- RIGHT SIDE: git graph visualization -->
  <!-- Main spine -->
  <line x1="580" y1="320" x2="1220" y2="320"
        stroke="url(#mainLine)" stroke-width="4" stroke-linecap="round" opacity="0.6"/>

  <!-- Branch arcs upper -->
  <path d="M 660 320 Q 730 220 810 320" stroke="#10B981" stroke-width="3.5" fill="none" opacity="0.8" stroke-linecap="round"/>
  <path d="M 860 320 Q 960 180 1070 320" stroke="#A855F7" stroke-width="3.5" fill="none" opacity="0.75" stroke-linecap="round"/>

  <!-- Branch arcs lower -->
  <path d="M 700 320 Q 760 430 820 320" stroke="#F59E0B" stroke-width="3" fill="none" opacity="0.7" stroke-linecap="round"/>
  <path d="M 940 320 Q 1010 460 1090 320" stroke="#EF4444" stroke-width="3" fill="none" opacity="0.65" stroke-linecap="round"/>

  <!-- Revert dashed -->
  <path d="M 800 320 Q 750 260 700 320" stroke="#F97316" stroke-width="2.5" fill="none"
        stroke-dasharray="8,6" opacity="0.6" stroke-linecap="round"/>

  <!-- Main branch nodes -->
  <circle cx="610" cy="320" r="14" fill="#3B82F6" filter="url(#glow)"/>
  <circle cx="660" cy="320" r="11" fill="#3B82F6" filter="url(#glow2)"/>
  <circle cx="810" cy="320" r="11" fill="#3B82F6" filter="url(#glow2)"/>
  <circle cx="860" cy="320" r="11" fill="#3B82F6" filter="url(#glow2)"/>
  <circle cx="1070" cy="320" r="11" fill="#3B82F6" filter="url(#glow2)"/>
  <circle cx="1120" cy="320" r="11" fill="#3B82F6" filter="url(#glow2)"/>
  <circle cx="1190" cy="320" r="14" fill="#3B82F6" filter="url(#glow)"/>

  <!-- Feature nodes -->
  <circle cx="730" cy="220" r="10" fill="#10B981" filter="url(#glow2)" opacity="0.9"/>
  <circle cx="960" cy="180" r="10" fill="#A855F7" filter="url(#glow2)" opacity="0.85"/>
  <circle cx="1010" cy="180" r="8" fill="#A855F7" opacity="0.7"/>
  <circle cx="760" cy="430" r="9" fill="#F59E0B" filter="url(#glow2)" opacity="0.85"/>
  <circle cx="1010" cy="458" r="9" fill="#EF4444" filter="url(#glow2)" opacity="0.8"/>
  <circle cx="745" cy="270" r="8" fill="#F97316" opacity="0.7"/>

  <!-- Subtle concentric rings on right -->
  <circle cx="900" cy="320" r="200" fill="none" stroke="#3B82F6" stroke-width="1" opacity="0.04"/>
  <circle cx="900" cy="320" r="280" fill="none" stroke="#3B82F6" stroke-width="1" opacity="0.03"/>

  <!-- LEFT SIDE: Text content -->
  <!-- Icon small -->
  <g transform="translate(80, 80)">
    <rect width="72" height="72" rx="16" fill="#1E293B"/>
    <!-- Simplified icon inside -->
    <line x1="10" y1="36" x2="62" y2="36" stroke="#3B82F6" stroke-width="3" opacity="0.5"/>
    <path d="M 18 36 Q 28 20 38 36" stroke="#10B981" stroke-width="2.5" fill="none"/>
    <path d="M 34 36 Q 44 52 54 36" stroke="#EF4444" stroke-width="2.5" fill="none"/>
    <circle cx="18" cy="36" r="5" fill="#3B82F6" filter="url(#glow2)"/>
    <circle cx="38" cy="36" r="5" fill="#3B82F6" filter="url(#glow2)"/>
    <circle cx="54" cy="36" r="5" fill="#3B82F6" filter="url(#glow2)"/>
    <circle cx="28" cy="20" r="4" fill="#10B981"/>
    <circle cx="44" cy="52" r="4" fill="#EF4444"/>
  </g>

  <!-- Main title -->
  <text x="80" y="230" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
        font-size="86" font-weight="700" fill="#F1F5F9" letter-spacing="-3" filter="url(#textglow)">DevMaze</text>

  <!-- Subtitle -->
  <text x="82" y="295" font-family="'SF Pro Text', 'Helvetica Neue', Arial, sans-serif"
        font-size="28" font-weight="400" fill="#64748B" letter-spacing="0.5">Development History Visualizer</text>

  <!-- Feature tags -->
  <g transform="translate(80, 340)">
    <!-- Tag 1 -->
    <rect width="156" height="36" rx="8" fill="#1D4ED820" stroke="#3B82F640" stroke-width="1"/>
    <circle cx="20" cy="18" r="6" fill="#3B82F6"/>
    <text x="34" y="23" font-family="'SF Pro Text', Arial, sans-serif" font-size="14" fill="#93C5FD">Git Graph</text>
    <!-- Tag 2 -->
    <rect x="166" width="186" height="36" rx="8" fill="#10B98120" stroke="#10B98140" stroke-width="1"/>
    <circle cx="186" cy="18" r="6" fill="#10B981"/>
    <text x="200" y="23" font-family="'SF Pro Text', Arial, sans-serif" font-size="14" fill="#6EE7B7">Trial-and-Error Score</text>
    <!-- Tag 3 -->
    <rect x="362" width="132" height="36" rx="8" fill="#A855F720" stroke="#A855F740" stroke-width="1"/>
    <circle cx="382" cy="18" r="6" fill="#A855F7"/>
    <text x="396" y="23" font-family="'SF Pro Text', Arial, sans-serif" font-size="14" fill="#D8B4FE">MCP Server</text>
  </g>

  <!-- Bottom badge -->
  <text x="80" y="560" font-family="'SF Pro Text', 'Helvetica Neue', Arial, sans-serif"
        font-size="16" fill="#334155">Electron + React + D3.js + @modelcontextprotocol/sdk</text>

  <!-- Version -->
  <text x="80" y="590" font-family="'SF Pro Text', Arial, sans-serif"
        font-size="14" fill="#1E3A5F">v0.1.0</text>

  <!-- Divider line -->
  <line x1="80" y1="530" x2="520" y2="530" stroke="#1E293B" stroke-width="1"/>
</svg>
