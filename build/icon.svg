<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%"   stop-color="#221608"/>
      <stop offset="100%" stop-color="#0C0804"/>
    </radialGradient>
    <radialGradient id="nHero" cx="38%" cy="32%" r="65%">
      <stop offset="0%"   stop-color="#FFE090"/>
      <stop offset="60%"  stop-color="#D4A84A"/>
      <stop offset="100%" stop-color="#8A6020"/>
    </radialGradient>
    <radialGradient id="nMid" cx="38%" cy="32%" r="65%">
      <stop offset="0%"   stop-color="#E8C070"/>
      <stop offset="100%" stop-color="#9A6A28"/>
    </radialGradient>
    <radialGradient id="nDim" cx="38%" cy="32%" r="65%">
      <stop offset="0%"   stop-color="#C89040"/>
      <stop offset="100%" stop-color="#6A4418"/>
    </radialGradient>

    <!-- Strong glow for paths -->
    <filter id="path-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="16" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="node-glow-xl" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="28" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="node-glow-lg" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="16" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="node-glow-sm" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Maze wall grid -->
    <pattern id="wall" width="88" height="88" patternUnits="userSpaceOnUse">
      <rect width="88" height="88" fill="#0C0804"/>
      <rect x="4" y="4" width="80" height="80" fill="#1C1208" rx="6"/>
    </pattern>

    <clipPath id="round">
      <rect width="1024" height="1024" rx="220"/>
    </clipPath>
  </defs>

  <!-- Base -->
  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>

  <g clip-path="url(#round)">

    <!-- Maze wall tiles -->
    <rect width="1024" height="1024" fill="url(#wall)" opacity="0.7"/>

    <!-- Central ambient glow -->
    <ellipse cx="512" cy="512" rx="360" ry="300" fill="#D4A84A" opacity="0.05"/>

    <!-- ═══════════════════════════════════════
         SNAKE PATH  (3 rows, direct orthogonal)
         Row1 y=290  →  Row2 y=490  →  Row3 y=690
    ════════════════════════════════════════ -->

    <!-- Glow layer (wide, dim) -->
    <g filter="url(#path-glow)" opacity="0.55">
      <!-- Row 1 -->
      <line x1="165" y1="290" x2="820" y2="290" stroke="#D4A84A" stroke-width="28" stroke-linecap="round"/>
      <!-- Turn R→D -->
      <line x1="820" y1="290" x2="820" y2="490" stroke="#D4A84A" stroke-width="28" stroke-linecap="round"/>
      <!-- Row 2 -->
      <line x1="820" y1="490" x2="165" y2="490" stroke="#D4A84A" stroke-width="28" stroke-linecap="round"/>
      <!-- Turn L→D -->
      <line x1="165" y1="490" x2="165" y2="690" stroke="#D4A84A" stroke-width="28" stroke-linecap="round"/>
      <!-- Row 3 -->
      <line x1="165" y1="690" x2="650" y2="690" stroke="#D4A84A" stroke-width="28" stroke-linecap="round"/>
    </g>

    <!-- Bright core path -->
    <g stroke-linecap="round" stroke-linejoin="round">
      <!-- Row 1: left → right -->
      <line x1="165" y1="290" x2="820" y2="290" stroke="#D4A84A" stroke-width="12"/>
      <!-- Turn: right edge, down -->
      <line x1="820" y1="290" x2="820" y2="490" stroke="#D4A84A" stroke-width="12"/>
      <!-- Row 2: right → left -->
      <line x1="820" y1="490" x2="165" y2="490" stroke="#D4A84A" stroke-width="12"/>
      <!-- Turn: left edge, down -->
      <line x1="165" y1="490" x2="165" y2="690" stroke="#D4A84A" stroke-width="12"/>
      <!-- Row 3: left → right (dead-end) -->
      <line x1="165" y1="690" x2="650" y2="690" stroke="#D4A84A" stroke-width="12"/>

      <!-- Feature branch: up from row1 node3 -->
      <line x1="490" y1="290" x2="490" y2="160" stroke="#B8924A" stroke-width="8" opacity="0.8"/>
      <line x1="490" y1="160" x2="620" y2="160" stroke="#B8924A" stroke-width="8" opacity="0.8"/>

      <!-- Feature branch: down from row2 node2 (dashed) -->
      <line x1="490" y1="490" x2="490" y2="600" stroke="#C88B3A" stroke-width="7"
            stroke-dasharray="20,10" opacity="0.7"/>
      <line x1="490" y1="600" x2="360" y2="600" stroke="#C88B3A" stroke-width="7"
            stroke-dasharray="20,10" opacity="0.7"/>
    </g>

    <!-- ═══════════════ NODES ═══════════════ -->

    <!-- Row 1 nodes: 165, 316, 490, 645, 820 -->
    <circle cx="316" cy="290" r="26" fill="url(#nMid)"  filter="url(#node-glow-sm)"/>
    <circle cx="645" cy="290" r="26" fill="url(#nMid)"  filter="url(#node-glow-sm)"/>

    <!-- Start node (row1 left) -->
    <circle cx="165" cy="290" r="34" fill="url(#nHero)" filter="url(#node-glow-lg)"/>
    <circle cx="152" cy="278" r="12" fill="#FFF0B0" opacity="0.45"/>

    <!-- Feature branch top node -->
    <circle cx="620" cy="160" r="22" fill="url(#nDim)"  filter="url(#node-glow-sm)" opacity="0.85"/>
    <circle cx="490" cy="160" r="18" fill="url(#nDim)"  opacity="0.7"/>

    <!-- Hero node: Row1-Row2 junction (820,290→820,490) mid -->
    <circle cx="820" cy="290" r="30" fill="url(#nHero)" filter="url(#node-glow-lg)"/>
    <circle cx="808" cy="278" r="11" fill="#FFF0B0" opacity="0.45"/>

    <!-- Row2 junction bottom -->
    <circle cx="820" cy="490" r="28" fill="url(#nMid)"  filter="url(#node-glow-sm)"/>

    <!-- Row 2 nodes -->
    <circle cx="490" cy="490" r="26" fill="url(#nHero)" filter="url(#node-glow-lg)"/>
    <circle cx="478" cy="478" r="10" fill="#FFF0B0" opacity="0.4"/>
    <circle cx="316" cy="490" r="24" fill="url(#nMid)"  filter="url(#node-glow-sm)"/>
    <circle cx="645" cy="490" r="22" fill="url(#nDim)"/>

    <!-- Left-edge turn node (165, 490→690) -->
    <circle cx="165" cy="490" r="30" fill="url(#nHero)" filter="url(#node-glow-lg)"/>
    <circle cx="153" cy="478" r="11" fill="#FFF0B0" opacity="0.45"/>

    <!-- Feature branch down nodes -->
    <circle cx="490" cy="600" r="20" fill="url(#nDim)" filter="url(#node-glow-sm)" opacity="0.75"/>
    <circle cx="360" cy="600" r="18" fill="url(#nDim)" opacity="0.65"/>

    <!-- Row 3 nodes -->
    <circle cx="165" cy="690" r="30" fill="url(#nMid)"  filter="url(#node-glow-sm)"/>
    <circle cx="316" cy="690" r="24" fill="url(#nMid)"  filter="url(#node-glow-sm)"/>
    <circle cx="490" cy="690" r="26" fill="url(#nHero)" filter="url(#node-glow-lg)"/>
    <circle cx="478" cy="678" r="9"  fill="#FFF0B0" opacity="0.4"/>

    <!-- Dead-end node -->
    <circle cx="650" cy="690" r="22" fill="url(#nDim)" opacity="0.8"/>

    <!-- CENTRAL SUPER HERO — intersection of row1/row2 visually -->
    <circle cx="490" cy="390" r="62" fill="#D4A84A" opacity="0.06" filter="url(#node-glow-xl)"/>

    <!-- Direction arrows (subtle) -->
    <text x="840" y="300" font-size="40" fill="#D4A84A" opacity="0.22" font-family="monospace">↓</text>
    <text x="828" y="502" font-size="40" fill="#D4A84A" opacity="0.2"  font-family="monospace">←</text>
    <text x="140" y="702" font-size="40" fill="#D4A84A" opacity="0.18" font-family="monospace">→</text>

  </g>

  <!-- Border -->
  <rect width="1024" height="1024" rx="220"
        fill="none" stroke="#D4A84A" stroke-width="3" opacity="0.12"/>
</svg>
