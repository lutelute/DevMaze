appId: com.pwslab.devmaze
productName: DevMaze
copyright: Copyright © 2026 PWS Lab

directories:
  output: release/${version}
  buildResources: build

files:
  - dist/**/*
  - dist-electron/**/*
  - node_modules/**/*

mac:
  target:
    - dmg
    - zip
  category: public.app-category.developer-tools

win:
  target:
    - nsis
    - portable

linux:
  target:
    - AppImage
    - deb
  category: Development

publish:
  provider: github
  owner: lutelute
  repo: devmaze
